        .rose-petal {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 9999;

            border-radius: 15px 0 15px 15px;
            opacity: 0.75;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { top: -20px; transform: translateX(0) rotate(0deg) scale(0.8); opacity: 0.8; }
