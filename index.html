            </div>
        </div>
    </div>

    <div id="page7" class="page">
        <div class="content-card">
            <h2>Книга пожеланий</h2>
            <p style="font-style: italic; font-size:1.1rem; color:#555; margin-bottom:20px;">Нам будет невероятно приятно прочесть ваши тёплые слова и напутствия:</p>
            
            <input type="text" id="author" class="wish-input" placeholder="Ваше Имя">
            <textarea id="text" class="wish-text" placeholder="Ваши искренние и нежные пожелания молодым..."></textarea>
            <button onclick="saveWish()" class="btn-nav" style="width:100%; background:#9E8454; color:#fff;">Отправить пожелание ✨</button>
            
            <div class="wishes-output" id="output-box"></div>

            <div class="nav-box">
                <button class="btn-nav" onclick="navigateToPage(6)">Назад</button>
            </div>
        </div>
    </div>

    <script>
        let isMusicPlaying = false;
        const audioPlayer = document.getElementById('wedding-audio');
        const mp3Url = "music.mp3";

        function loadGuestName() {
            const urlParams = new URLSearchParams(window.location.search);
            const guestName = urlParams.get('name') || urlParams.get('to');
            if (guestName) {
                document.getElementById('guest-title-heading').innerText = guestName;
            }
        }
        window.addEventListener('DOMContentLoaded', loadGuestName);

        function openEnvelope(event) {
            if(event) event.stopPropagation(); 
            let screen = document.getElementById('envelope-screen');
            if (!screen) return;

            let centerX = window.innerWidth / 2;
            let centerY = window.innerHeight / 2;

            for (let i = 0; i < 35; i++) {
                let p = document.createElement('div');
                p.className = 'heart-particle';
                let size = Math.random() * 14 + 12;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = centerX - (size/2) + 'px';
                p.style.top = centerY - (size/2) + 'px';
                document.body.appendChild(p);

                let angle = Math.random() * Math.PI * 2;
                let distance = Math.random() * 250 + 100; 
                let destX = Math.cos(angle) * distance;
                let destY = Math.sin(angle) * distance - (Math.random() * 100); 

                setTimeout(() => {
                    p.style.transform = `translate(${destX}px, ${destY}px) rotate(${Math.random() * 360}deg) scale(0.5)`;
                    p.style.opacity = '0';
                }, 30);
                setTimeout(() => p.remove(), 2000);
            }

            screen.style.display = 'none';

            audioPlayer.src = mp3Url;
            audioPlayer.play().then(() => {
                isMusicPlaying = true;
                document.getElementById('music-status-text').innerText = "Музыка играет";
                document.getElementById('music-icon').innerText = "🎵";
            }).catch(e => {
                document.getElementById('music-status-text').innerText = "Музыка на паузе";
                document.getElementById('music-icon').innerText = "🔇";
            });

            navigateToPage(1); 
            startPetalsFalling(); 
        }

        function navigateToPage(num) {
            document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); });
            let activePage = document.getElementById('page' + num);
            if (activePage) {
                activePage.classList.add('active');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function toggleAudio(event) {
            if(event) event.stopPropagation(); 
            if (!audioPlayer.src || audioPlayer.src === "") { audioPlayer.src = mp3Url; }
            let statusText = document.getElementById('music-status-text');
            let icon = document.getElementById('music-icon');
            if (isMusicPlaying) {
                audioPlayer.pause();
                isMusicPlaying = false;
                statusText.innerText = "Музыка на паузе";
                icon.innerText = "🔇";
            } else {
                audioPlayer.play().then(() => {
                    isMusicPlaying = true;
                    statusText.innerText = "Музыка играет";
                    icon.innerText = "🎵";
                }).catch(err => {
                    alert("Пожалуйста, нажмите на плашку музыки ещё раз.");
                });
            }
        }

        function saveWish() {
            let name = document.getElementById('author').value.trim();
            let wish = document.getElementById('text').value.trim();
            if(!name || !wish) return alert('Заполните поля имени и текста.');
            let box = document.getElementById('output-box');
            let item = document.createElement('div');
            item.className = 'wish-item';
            item.innerHTML = `<strong>${name}:</strong> ${wish}`;
            box.insertBefore(item, box.firstChild);
            document.getElementById('author').value = '';
            document.getElementById('text').value = '';
        }

        function previewImages(event) {
            let files = event.target.files;
            let box = document.getElementById('gallery-box');
            for(let i=0; i<files.length; i++) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    let img = document.createElement('img');
                    img.src = e.target.result;
                    box.insertBefore(img, box.firstChild);
                }
                reader.readAsDataURL(files[i]);
            }
        }

        function startPetalsFalling() {
            setInterval(() => {
                let petal = document.createElement('div');
                petal.className = 'rose-petal';
                petal.style.left = Math.random() * window.innerWidth + 'px';
                petal.style.animationDuration = (Math.random() * 4 + 5) + 's';
                let sizeW = Math.random() * 12 + 16;
                let sizeH = sizeW * 1.2;
                petal.style.width = sizeW + 'px';
                petal.style.height = sizeH + 'px';
                document.body.appendChild(petal);
                setTimeout(() => petal.remove(), 8000);
            }, 220); 
        }

        const weddingDate = new Date('July 31, 2026 17:00:00').getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = weddingDate - now;
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }
        }, 1000);
    </script>
</body>
</html>
