<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на торжество</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%;
            background: #FFEBF0;
            color: #2A2F35;
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
        }
        
        /* ГЛАВНЫЙ ЭКРАН С КОНВЕРТОМ */
        #envelope-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #F5E6CC 0%, #E8D3B5 50%, #CFA87B 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; cursor: pointer;
        }
        
        .envelope {
            width: 440px; 
            height: 280px; 
            max-width: 92%; 
            background: #FFFFFF; 
            box-shadow: 0 35px 85px rgba(0,0,0,0.2);
            border-radius: 8px; 
            border: 1px solid #EAE2D5; 
            position: relative; 
            box-sizing: border-box;
        }

        /* Рамка внутри конверта */
        .envelope::before {
            content: ''; 
            position: absolute; 
            top: 14px; left: 14px; right: 14px; bottom: 14px; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            pointer-events: none;
            box-sizing: border-box;
        }

        /* Контейнер содержимого */
        .envelope-content {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 5;
        }
        
        /* ПЕЧАТЬ С ЖЕСТКИМИ РАЗМЕРАМИ */
        .seal-circle {
            width: 95px; 
            height: 95px; 
            min-width: 95px;
            min-height: 95px;
            background: #B21F1F; 
            border-radius: 50%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            border: 2px solid #D4AF37;
            animation: pulse 2s infinite;
            box-sizing: border-box;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .seal-heart { font-size: 1.6rem; line-height: 1; margin-bottom: 2px; display: block; }
        .seal-text { color: #FFFDF9; font-family: 'Great Vibes', cursive, serif; font-size: 1.3rem; font-weight: bold; line-height: 1; display: block; text-align: center; }
        .envelope-text { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; color: #7A7465; font-weight: 600; margin-top: 25px; text-align: center; display: block; width: 100%; }
        
        /* МУЗЫКАЛЬНАЯ ПАНЕЛЬ */
        #cozy-music-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); border: 1px solid #9E8454;
            padding: 8px 20px; border-radius: 30px; display: none; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100000; cursor: pointer;
        }
        .music-bar-text { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #9E8454; font-weight: 600; }
        
        /* СТРАНИЦЫ И КАРТОЧКИ */
        .page { display: none; width: 100%; min-height: 100vh; padding: 90px 20px 40px 20px; text-align: center; justify-content: center; align-items: center; flex-direction: column; position: relative; z-index: 2; }
        .page.active { display: flex !important; }
        .content-card {
            width: 100%; max-width: 500px; padding: 35px 20px; background: #FFFFFF;
            border: 1px solid rgba(212, 175, 55, 0.3); box-shadow: 0 15px 45px rgba(0,0,0,0.07); border-radius: 12px; position: relative;
        }
        
        h2 { font-size: 1.6rem; color: #9E8454; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .invitation-text { font-size: 1.2rem; line-height: 1.6; font-style: italic; margin-bottom: 15px; }
        .parents-names-style { font-family: 'Great Vibes', cursive; font-size: 2.6rem; color: #bc9356; display: block; margin: 5px 0; }
        .hosts-title { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #8A8475; font-weight: 600; }
        .hosts-status { font-size: 0.9rem; font-style: italic; color: #7A828A; }
        
        /* СЕРДЦЕ НА СТРАНИЦЕ 2 */
        .heart-box {
            width: 180px; height: 180px; background: #FFFDF9; border: 2px solid #bc9356;
            margin: 20px auto; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 50% 50% 0 0 / 40% 40% 0 0; transform: rotate(-45deg);
        }
        .heart-inside-text { transform: rotate(45deg); font-family: 'Great Vibes', cursive; font-size: 1.8rem; color: #b38e5d; text-align: center; line-height: 1.2; }
        
        /* ПРОГРАММА ВЕЧЕРА */
        .timeline-container { text-align: left; margin: 15px auto; max-width: 400px; }
        .timeline-item { display: flex; margin-bottom: 14px; font-size: 1.1rem; }
