<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на торжество | Сагын & Айнуру</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%;
            /* ПРЕМИАЛЬНАЯ ТЕКСТУРА БУМАГИ ВЕРЖЕ НА ВЕСЬ ФОН */
            background-color: #FAF9F6;
            background-image: 
                linear-gradient(90deg, rgba(212,175,55,0.01) 1px, transparent 1px),
                linear-gradient(rgba(212,175,55,0.01) 1px, transparent 1px);
            background-size: 4px 4px;
            background-attachment: fixed;
            color: #2A2F35;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            position: relative;
        }

        /* РОСКОШНЫЙ КАЛЛИГРАФИЧЕСКИЙ СТИЛЬ ДЛЯ МОЛОДЫХ */
        .couple-names-style {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem; /* Увеличено */
            color: #b38e5d; /* Нежный розово-золотой */
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3); /* Золотое сияние чувств */
            margin: 15px 0;
            display: block;
            letter-spacing: -1px;
        }

        /* СКРОМНЫЙ, НО УВАЖИТЕЛЬНЫЙ СТИЛЬ ДЛЯ РОДИТЕЛЕЙ */
        .parents-names-style {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem; /* Сильно уменьшено */
            font-weight: 600;
            color: #2A2F35; /* Строгий цвет */
            letter-spacing: 1px;
            margin-top: 5px;
            text-transform: none; /* Убран капс */
            display: block;
        }

        /* АНИМАЦИЯ ЛЕПЕСТКОВ РОЗ (УВЕЛИЧЕНО В 2 РАЗА) */
        .rose-petal {
            position: fixed;
            top: -20px;
            pointer-events: none;
            z-index: 1; /* Под карточкой */
            background: radial-gradient(circle at 40% 40%, #ffccd5, #ffb3c1 60%, #ff4d6d);
            border-radius: 15px 0 15px 15px;
            opacity: 0.6;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { top: -20px; transform: translateX(0) rotate(0deg) scale(0.6); opacity: 0.7; }
            50% { transform: translateX(50px) rotate(180deg) scale(0.8); opacity: 0.6; }
            100% { top: 105vh; transform: translateX(100px) rotate(360deg) scale(0.5); opacity: 0; }
        }

        /* ЭФФЕКТ СЕРДЕЧЕК ПРИ ОТКРЫТИИ */
        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            will-change: transform, opacity;
            background: radial-gradient(circle at 35% 35%, #e63946, #d90429);
            clip-path: path('M12 4.419c-2.426-3.484-7.208-3.484-9.633 0-2.508 3.612-2.508 9.471 0 13.084l9.633 9.497 9.633-9.497c2.508-3.613 2.508-9.472 0-13.084-2.425-3.484-7.207-3.484-9.633 0z');
            opacity: 1;
            transition: transform 2s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 2s ease-out;
        }

        /* ЭКРАН С КОНВЕРТОМ (ПРИОРИТЕТ 1) */
        #envelope-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #EADEC9 0%, #D6C7B1 50%, #BFA785 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        .envelope {
            width: 440px; 
            height: 280px;
            max-width: 92%;
            background: #FFFFFF; 
            box-shadow: 0 35px 85px rgba(0,0,0,0.15);
            border-radius: 4px;
            border: 1px solid #EAE2D5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 14px; left: 14px; right: 14px; bottom: 14px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            pointer-events: none;
        }

        .heart-seal-wrapper {
            width: 110px;
            height: 100px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 8px 15px rgba(178, 31, 31, 0.4));
        }

        .heart-svg-seal {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
        }

        .heart-seal-text {
            position: relative;
            z-index: 2;
            color: #F9E7B9; 
            font-family: 'Great Vibes', cursive;
            font-weight: bold;
            font-size: 2.1rem;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
            margin-top: -6px;
        }

        .envelope-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #8A8475;
            font-weight: 500;
            margin-top: 15px;
        }

        /* МУЗЫКАЛЬНАЯ ПАНЕЛЬ */
        #cozy-music-bar {
            position: fixed;
            top: 30px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(158, 132, 84, 0.3);
            padding: 10px 24px;
            border-radius: 30px;
            display: flex; 
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(158, 132, 84, 0.1);
            z-index: 100000; 
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #cozy-music-bar:hover {
            border-color: #9E8454;
            transform: translateX(-50%) scale(1.03);
        }
        .music-bar-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #9E8454;
            font-weight: 600;
        }
        .music-btn-circle {
            width: 28px;
            height: 28px;
            background: #9E8454;
            color: #FFFFFF;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
        }

        /* МНОГОСТРАНИЧНАЯ СИСТЕМА (ПРИОРИТЕТ 2) */
        .page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 95px 20px 30px 20px; 
            overflow-y: auto;
            text-align: center;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            z-index: 5;
        }
        .page.active { display: flex !important; animation: fadeInPage 0.6s ease forwards; }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

        .content-card {
            width: 100%;
            max-width: 520px;
            margin: auto;
            padding: 45px 25px;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(158, 132, 84, 0.2);
            box-shadow: 0 20px 60px rgba(158, 132, 84, 0.08);
            border-radius: 2px;
            position: relative;
            z-index: 10; /* Выше лепестков */
        }
        .content-card::after {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid rgba(158, 132, 84, 0.15);
            pointer-events: none;
        }

        h2 { font-size: 1.65rem; color: #9E8454; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; font-weight: 400; }
        
        .invitation-text {
            font-size: 1.15rem;
            line-height: 1.8;
            font-style: italic;
            color: #3A4047;
            margin-bottom: 15px;
        }

        .hosts-title { font-family: 'Cormorant Garamond', serif; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; color: #8A8475; }
        .hosts-status { font-size: 0.9rem; font-style: italic; color: #8A8475; }

        /* НАВИГАЦИЯ */
        .nav-box { display: flex; justify-content: center; gap: 12px; margin-top: 35px; width: 100%; position: relative; z-index: 20; }
        .btn-nav {
            padding: 11px 28px;
            background: #FFFFFF;
            border: 1px solid #9E8454;
            color: #9E8454;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: 500;
            border-radius: 0;
        }
        .btn-nav:hover { background: #9E8454; color: #FFFFFF; box-shadow: 0 5px 15px rgba(158, 132, 84, 0.15); }

        /* ТАЙМЕР */
        .timer-grid { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .timer-item { background: #FFFFFF; border: 1px solid #EAE5DC; padding: 10px; min-width: 68px; }
        .timer-num { font-size: 1.5rem; color: #2A2F35; font-weight: 600; }
        .timer-label { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; color: #8A94A0; text-transform: uppercase; letter-spacing: 1px; }

        /* БЛАГОРОДНАЯ ПРОГРАММА ВЕЧЕРА */
        .timeline-container {
            text-align: left;
            margin: 15px auto 5px auto;
            max-width: 440px;
        }
        .timeline-item {
            display: flex;
            margin-bottom: 18px;
            align-items: flex-start;
        }
        .timeline-time {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: #9E8454;
            min-width: 60px;
            padding-top: 2px;
        }
        .timeline-dot {
            margin: 0 15px;
            font-size: 1rem;
            line-height: 1;
            padding-top: 2px;
            color: #9E8454;
        }
        .timeline-text {
            font-size: 1.15rem;
            color: #333;
            line-height: 1.4;
            font-style: italic;
        }

        /* ДРЕСС-КОД И АДРЕС - ОРИГИНАЛЬНЫЕ СТРАНИЦЫ */
        .dc-badge {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #9E8454;
            font-weight: 600;
            margin: 15px 0;
            display: inline-block;
            border-bottom: 1px solid #9E8454;
            padding-bottom: 6px;
        }

        .dc-palette {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }
        .dc-circle-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .dc-circle { width: 45px; height: 45px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); }
        .dc-label { font-family: 'Montserrat', sans-serif; font-size: 0.6rem; text-transform: uppercase; color: #8A8475; letter-spacing: 1px; }

        .address-card-border {
