// Полностью замени эти две функции в блоке <script>

function openEnvelope(event) {
    if(event) event.stopPropagation(); 
    let screen = document.getElementById('envelope-screen');
    let centerX = window.innerWidth / 2;
    let centerY = window.innerHeight / 2;

    // Эффект сердечек
    for (let i = 0; i < 35; i++) {
        let p = document.createElement('div');
        p.className = 'heart-particle';
        let size = Math.random() * 14 + 12;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = centerX - (size/2) + 'px';
        p.style.top = centerY - (size/2) + 'px';
        document.body.appendChild(p);

        let angle = Math.random() * Math.PI * 2;
        let distance = Math.random() * 280 + 100; 
        let destX = Math.cos(angle) * distance;
        let destY = Math.sin(angle) * distance - (Math.random() * 150); 

        setTimeout(() => {
            p.style.transform = `translate(${destX}px, ${destY}px) rotate(${Math.random() * 360}deg) scale(${Math.random() * 0.5 + 0.8})`;
            p.style.opacity = '0';
        }, 30);
        setTimeout(() => p.remove(), 2100);
    }

    screen.style.opacity = '0';
    screen.style.transform = 'scale(1.03)';
    
    // ПРИНУДИТЕЛЬНЫЙ ЗАПУСК МУЗЫКИ ПРИ КЛИКЕ НА КОНВЕРТ
    const audioPlayer = document.getElementById('wedding-audio');
    audioPlayer.play().then(() => {
        isMusicPlaying = true;
        document.getElementById('music-status-text').innerText = "Музыка играет";
    }).catch(e => {
        console.log("Браузер всё ещё блокирует, ждем клика по панели звука:", e);
        document.getElementById('music-status-text').innerText = "Включить музыку";
    });

    setTimeout(() => {
        screen.style.display = 'none';
        navigateToPage(1); 
        startPetalsFalling(); 
    }, 500);
}

function toggleAudio(event) {
    if(event) event.stopPropagation(); 
    const audioPlayer = document.getElementById('wedding-audio');
    let statusText = document.getElementById('music-status-text');
    
    if (isMusicPlaying) {
        audioPlayer.pause();
        isMusicPlaying = false;
        statusText.innerText = "Музыка на паузе";
    } else {
        audioPlayer.play().then(() => {
            isMusicPlaying = true;
            statusText.innerText = "Музыка играет";
        }).catch(err => {
            alert("Пожалуйста, нажмите в любом месте экрана, чтобы разрешить проигрывание звука.");
        });
    }
}
